<html>
	<head>
		<title>read-excel-file</title>

		<meta charset="utf-8">

		<script src="./read-excel-file.min.js"></script>

		<script src="./lib/promise-polyfill.min.js"></script>

		<script src="./lib/prism.js"></script>

		<style>
			body
			{
				margin : 20px;
				font-family : Arial, Helvetica;
				background: #434343;
				color: #dddddd;
			}

			#input
			{
				margin-top    : 20px;
				margin-bottom : 10px;
			}

			#sheet-tabs
			{

			}

			.sheet-tab
			{
				padding: 8px 16px;
				border: 1px solid transparent;
				outline: 0;
				cursor: pointer;
				color: white;
				background-color: transparent;
			}

			.sheet-tab--selected
			{
				color: black;
				background-color: #fd8900;
				border: 1px solid #fd8900;
			}

			.sheet-tab--loading
			{
				cursor: wait;
			}

			.selected-sheet-tab-content--loading
			{
				cursor: wait;
			}

			#selected-sheet-data-visual table
			{
				width : 100%;
				border-collapse : collapse;
				margin-top    : 2.5em;
				margin-bottom : 2.5em;
				font-size     : 12px;
  		}

			#selected-sheet-data-visual table td
			{
				border : 1px solid black;
				padding : 0.5em;

				text-overflow : ellipsis;
				overflow      : hidden;
				max-width     : 10em;
				white-space   : nowrap;
			}

			#main-link
			{
				display     : block;
				font-size   : 24px;
				color       : #fd8900;
				font-family : monospace;
				text-decoration : none;
			}

			a
			{
				color: #fd8900;
			}

			.file-upload
			{
				text-transform: uppercase;
				letter-spacing: 1px;
				font-size: 0.75rem;
				color: #fd8900;
				border: 1px solid currentColor;
				border-radius: 4px;
				display: inline-block;
				padding: 6px 12px;
				cursor: pointer;
			}

			.file-upload:active
			{
				color: black;
				font-weight: bolder;
				background-color: #fd8900;
			}

			input[type="file"]
			{
				display: none;
			}

			#result,
			#error,
			#loading
			{
				display: none;
				margin-top: 2.5rem;
			}

			#error
			{
				color: #ff7979;
			}

			/* Loading Indicator */
			/* https://loading.io/css/ */
			.lds-ellipsis {
				display: inline-block;
				position: relative;
				width: 40px;
				height: 40px;
			}
			.lds-ellipsis div {
				position: absolute;
				top: 16px;
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: #fff;
				animation-timing-function: cubic-bezier(0, 1, 1, 0);
			}
			.lds-ellipsis div:nth-child(1) {
				left: 4px;
				animation: lds-ellipsis1 0.6s infinite;
			}
			.lds-ellipsis div:nth-child(2) {
				left: 4px;
				animation: lds-ellipsis2 0.6s infinite;
			}
			.lds-ellipsis div:nth-child(3) {
				left: 16px;
				animation: lds-ellipsis2 0.6s infinite;
			}
			.lds-ellipsis div:nth-child(4) {
				left: 28px;
				animation: lds-ellipsis3 0.6s infinite;
			}
			@keyframes lds-ellipsis1 {
				0% {
					transform: scale(0);
				}
				100% {
					transform: scale(1);
				}
			}
				@keyframes lds-ellipsis3 {
				0% {
					transform: scale(1);
				}
				100% {
					transform: scale(0);
				}
			}
			@keyframes lds-ellipsis2 {
				0% {
					transform: translate(0, 0);
				}
				100% {
					transform: translate(12px, 0);
				}
			}
		</style>

		<link href="lib/prism.css" rel="stylesheet" />
	</head>

	<body>
		<a id="main-link" href="https://gitlab.com/catamphetamine/read-excel-file">
			read-excel-file
		</a>

		<br/>

		<div style="line-height: 1.35em">
			Read small to medium <code>*.xlsx</code> files in a browser or Node.js.
		</div>
		<div style="line-height: 1.35em; margin-top: 0.35em">
			Parse file data to an array of JSON objects using a schema.
		</div>

		<br/>

		<label for="input" class="file-upload">
			Click here to choose an <code>*.xlsx</code> file
		</label>
		<input type="file" id="input" />

		<div id="loading">
			<div class="lds-ellipsis"><div></div><div></div><div></div><div></div></div>
		</div>

		<div id="error">
		</div>

		<div id="result">
			<h2>
				File Data
			</h2>

			<div style="margin-top: 1rem">
				Also supports parsing file data to an array of JSON objects using a schema. <a target="_blank" href="https://www.npmjs.com/package/read-excel-file#schema" style="text-decoration: none">Read more</a>
			</div>

			<br/>

			<div id="sheet-tabs"></div>

			<div id="selected-sheet-tab-content">
				<!-- <div id="selected-sheet-data-visual"></div> -->
				<pre><code class="language-js" id="selected-sheet-data"></code></pre>
			</div>
		</div>

		<script>
			var input = document.getElementById('input')

			function onLoading() {
				document.getElementById('result').style.display = 'none'
		    document.getElementById('error').style.display = 'none'
		    document.getElementById('loading').style.display = 'block'
			}

			function onCancelLoading() {
		    document.getElementById('loading').style.display = 'none'
			}

			function onError(error) {
				console.error(error)
				// alert("Error while parsing Excel file. See console output for the error stack trace.")
				document.getElementById('loading').style.display = 'none'
				document.getElementById('error').style.display = 'block'
				document.getElementById('error').innerText = error.message
			}

			function onSheetsList(sheets) {
				var sheetTabsHtml = sheets.map(function (sheet) {
					return `<button onclick="selectSheetTab('${sheet.name.replaceAll('\'', '\\\'')}')" class="sheet-tab">${sheet.name}</button>`
				}).join('')
				document.getElementById('sheet-tabs').innerHTML = sheetTabsHtml
				selectSheetTab(sheets[0].name)
			}

			function onSheetData(data) {
				document.getElementById('loading').style.display = 'none'
				document.getElementById('result').style.display = 'block'
				// `data` is an array of rows
				// each row being an array of cells.
				// document.getElementById('result').innerText = JSON.stringify(data, null, 2)
				document.getElementById('selected-sheet-data').innerHTML = Prism.highlight(
					JSON.stringify(data, null, 2),
					Prism.languages.javascript,
					'javascript'
				)

				// Applying `innerHTML` hangs the browser when there're a lot of rows/columns.
				// For example, for a file having 2000 rows and 20 columns on a modern
				// mid-tier CPU it parses the file (using a "schema") for 3 seconds
				// (blocking) with 100% single CPU core usage.
				// Then applying `innerHTML` hangs the browser.

				// document.getElementById('selected-sheet-data-visual').innerHTML =
				// 	'<table>' +
				// 	'<tbody>' +
				// 	data.map(function (row) {
				// 		return '<tr>' +
				// 			row.map(function (cell) {
				// 				return '<td>' +
				//  				(cell === null ? '' : cell) +
				//  				'</td>'
				// 			}).join('') +
				// 			'</tr>'
				// 	}).join('') +
				// 	'</tbody>' +
				// 	'</table>'
			}

			function onStartLoadingSheetData() {
				var tabs = document.querySelectorAll('#sheet-tabs .sheet-tab')
				var i = 0
				while (i < tabs.length) {
					tabs[i].classList.add('sheet-tab--loading')
					i++
				}

				document.querySelector('#selected-sheet-tab-content').classList.add('.selected-sheet-tab-content--loading')
			}

			function onEndLoadingSheetData() {
				var tabs = document.querySelectorAll('#sheet-tabs .sheet-tab')
				var i = 0
				while (i < tabs.length) {
					tabs[i].classList.remove('sheet-tab--loading')
					i++
				}

				document.querySelector('#selected-sheet-tab-content').classList.remove('.selected-sheet-tab-content--loading')
			}

			function onFileSelected(file) {
			  return readXlsxFile(file, { getSheets: true }).then(
					onSheetsList,
					onError
				)
			}

			function readSheet(sheetName) {
				return readXlsxFile(input.files[0], { sheet: sheetName }).then(
					onSheetData,
					onError
				)
			}

			input.addEventListener('change', function() {
		    onLoading()

		    if (!input.files[0]) {
					onCancelLoading()
		    	return
		    }

				onFileSelected(input.files[0])
			})

			function selectSheetTab(sheetName) {
				// If the sheet is already selected, don't do anything.
				var selectedTab = document.querySelector('#sheet-tabs .sheet-tab--selected')
				if (selectedTab && selectedTab.textContent === sheetName) {
					return
				}

				// Select the sheet's tab.
				var tabs = document.querySelectorAll('#sheet-tabs .sheet-tab')
				var i = 0
				while (i < tabs.length) {
					if (tabs[i].textContent === sheetName) {
						tabs[i].classList.add('sheet-tab--selected')
					} else {
						tabs[i].classList.remove('sheet-tab--selected')
					}
					i++
				}
				// Load sheet data.
				onStartLoadingSheetData()
				readSheet(sheetName).finally(onEndLoadingSheetData)
			}
		</script>
	</body>
</html>
