<html>
	<head>
		<title>read-excel-file</title>

		<meta charset="utf-8">

		<script src="./read-excel-file.min.js"></script>

		<script src="./lib/virtual-scroller-dom.js"></script>

		<script src="./lib/promise-polyfill.min.js"></script>

		<script src="./lib/prism.js"></script>

		<style>
			body
			{
				margin : 20px;
				font-family : Arial, Helvetica;
				background: #434343;
				color: #dddddd;
			}

			#input
			{
				margin-top    : 20px;
				margin-bottom : 10px;
			}

			#sheet-tabs
			{
				margin-top: -0.25rem;
				margin-bottom: -0.25rem;
			}

			.sheet-tab
			{
				padding: 8px 16px;
				margin-left: 0.25rem;
				margin-right: 0.25rem;
				margin-top: 0.25rem;
				margin-bottom: 0.25rem;
				border: 1px solid transparent;
				outline: 0;
				cursor: pointer;
				color: white;
				background-color: #3c3c3c;
				border-radius: 0.25rem;
			}

			.sheet-tab--selected
			{
				color: black;
				background-color: #f98700;
				border: 1px solid #f98700;
			}

			.sheet-tab--loading
			{
				cursor: wait;
			}

			.selected-sheet-tab-content--loading
			{
				cursor: wait;
			}

			#selected-sheet-data-visual table
			{
				width : 100%;
				border-collapse : collapse;
				margin-top    : 2.5em;
				margin-bottom : 2.5em;
				font-size     : 12px;
			}

			#selected-sheet-data-visual table td
			{
				border : 1px solid black;
				padding : 0.5em;

				text-overflow : ellipsis;
				overflow      : hidden;
				max-width     : 10em;
				white-space   : nowrap;
			}

			#selected-sheet-data-capped-warning
			{
				opacity: 0.75;
			}

			#json-data-container-title
			{
				margin-top: 3rem;
				margin-bottom: 1rem;
			}

			.json-data-hint
			{
				margin-top: 1rem;
			}

			.json-data-hint-text
			{
				opacity: 0.75;
			}

			.json-data-hint a
			{
				color: #f98700;
			}

			#json-data-container
			{
				max-height: 80vh;
				border-radius: 0.25rem;
				scrollbar-color: #777777 #2d2d2d;
			}

			#table-container
			{
				margin-top: 1rem;
				margin-bottom: 1rem;
				/* padding-top: 1rem; */
				/* padding-bottom: 1rem; */

				max-height: 40vh;
				overflow: auto;

				scrollbar-color: #777777 #2d2d2d;

				border-radius: 0.25rem;

				background-color: #3c3c3c;
			}

			#table-container table
			{
				width: 100%;
				table-layout: fixed;
			}

			#table-container th, #table-container td
			{
				padding-left: 1em;
				padding-right: 1em;
				padding-top: 1em;
				padding-bottom: 1em;
			}

			#main-link
			{
				display     : block;
				font-size   : 24px;
				color       : #fd8900;
				font-family : monospace;
				text-decoration : none;
			}

			a
			{
				color: #fd8900;
			}

			.file-upload
			{
				text-transform: uppercase;
				letter-spacing: 1px;
				font-size: 0.75rem;
				color: #fd8900;
				border: 1px solid currentColor;
				border-radius: 4px;
				display: inline-block;
				padding: 6px 12px;
				cursor: pointer;
			}

			.file-upload:active
			{
				color: black;
				font-weight: bolder;
				background-color: #fd8900;
			}

			input[type="file"]
			{
				display: none;
			}

			#result,
			#error,
			#loading
			{
				display: none;
			}

			#error,
			#loading
			{
				margin-top: 1rem;
			}

			#result
			{
				margin-top: 3rem;
			}

			#error
			{
				color: #ff7979;
			}

			/* Loading Indicator */
			/* https://loading.io/css/ */
			.lds-ellipsis {
				display: inline-block;
				position: relative;
				width: 40px;
				height: 40px;
			}
			.lds-ellipsis div {
				position: absolute;
				top: 16px;
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: #cccccc;
				animation-timing-function: cubic-bezier(0, 1, 1, 0);
			}
			.lds-ellipsis div:nth-child(1) {
				left: 4px;
				animation: lds-ellipsis1 0.6s infinite;
			}
			.lds-ellipsis div:nth-child(2) {
				left: 4px;
				animation: lds-ellipsis2 0.6s infinite;
			}
			.lds-ellipsis div:nth-child(3) {
				left: 16px;
				animation: lds-ellipsis2 0.6s infinite;
			}
			.lds-ellipsis div:nth-child(4) {
				left: 28px;
				animation: lds-ellipsis3 0.6s infinite;
			}
			@keyframes lds-ellipsis1 {
				0% {
					transform: scale(0);
				}
				100% {
					transform: scale(1);
				}
			}
				@keyframes lds-ellipsis3 {
				0% {
					transform: scale(1);
				}
				100% {
					transform: scale(0);
				}
			}
			@keyframes lds-ellipsis2 {
				0% {
					transform: translate(0, 0);
				}
				100% {
					transform: translate(12px, 0);
				}
			}
		</style>

		<link href="lib/prism.css" rel="stylesheet" />
	</head>

	<body>
		<a id="main-link" href="https://gitlab.com/catamphetamine/read-excel-file">
			read-excel-file
		</a>

		<br/>

		<div style="line-height: 1.35em">
			Read <code>.xlsx</code> files in a web browser or Node.js.
		</div>
		<div style="line-height: 1.35em; margin-top: 0.35em">
			Parse file data to an array of JSON objects using a schema.
		</div>

		<br/>

		<label for="input" class="file-upload">
			Click here to choose an <code>*.xlsx</code> file
		</label>
		<input type="file" id="input" />

		<div id="loading">
			<div class="lds-ellipsis"><div></div><div></div><div></div><div></div></div>
		</div>

		<div id="error">
		</div>

		<div id="result">
			<h2>
				File Data
			</h2>

			<div id="sheet-tabs"></div>

			<div id="selected-sheet-tab-content">
				<div id="table-container">
					<table>
						<tbody id="table-rows-container">
						</tbody>
					</table>
				</div>
				<!-- <div id="selected-sheet-data-visual"></div> -->
				<h2 id="json-data-container-title">JSON data</h2>

				<div class="json-data-hint">
					<span class="json-data-hint-text">
						It also supports parsing file data to an array of JSON objects using a schema.
					</span>
					<a target="_blank" href="https://www.npmjs.com/package/read-excel-file#schema" style="text-decoration: none">Read more</a>
				</div>

				<p id="selected-sheet-data-capped-warning"></p>
				<pre id="json-data-container"><code class="language-js" id="selected-sheet-data"></code></pre>
			</div>
		</div>

		<script>
			var input = document.getElementById('input')

			var virtualScroller
			var excelFileData
			var readXlsxFileStartedAt
			var readSheetDataStartedAt

			function onLoading() {
				// Reset previously-selected file.
				if (virtualScroller) {
					document.getElementById('sheet-tabs').innerHTML = ''
					document.getElementById('selected-sheet-data').scrollTo(0, 0)
					document.getElementById('selected-sheet-data').innerHTML = ''

					virtualScroller.stop()
					virtualScroller = undefined
					document.getElementById('table-container').scrollTo(0, 0)
					document.getElementById('table-rows-container').innerHTML = ''
				}

				excelFileData = undefined

				document.getElementById('result').style.display = 'none'
				document.getElementById('error').style.display = 'none'
				document.getElementById('loading').style.display = 'block'
			}

			function onCancelLoading() {
				document.getElementById('loading').style.display = 'none'
			}

			function onError(error) {
				console.error(error)
				// alert("Error while parsing Excel file. See console output for the error stack trace.")
				document.getElementById('loading').style.display = 'none'
				document.getElementById('error').style.display = 'block'
				document.getElementById('error').innerText = error.message
			}

			function onFileData(fileData) {
				console.log('Finished reading .xlsx file in', (Date.now() - readXlsxFileStartedAt), 'ms')

				document.getElementById('loading').style.display = 'none'
				document.getElementById('result').style.display = 'block'

				excelFileData = fileData

				var sheetTabsHtml = fileData.map(function (sheetInfo, i) {
					return `<button onclick="selectSheetTab(${i})" class="sheet-tab">${sheetInfo.sheet}</button>`
				}).join('')
				document.getElementById('sheet-tabs').innerHTML = sheetTabsHtml
				selectSheetTab(0)
			}

			// function onSheetData(data) {
			// 	console.log('Finished reading sheets data in', (Date.now() - readSheetDataStartedAt), 'ms')
			// 	console.log('Sheet data:', data)
			//
			// 	document.getElementById('loading').style.display = 'none'
			// 	document.getElementById('result').style.display = 'block'
			//
			// 	console.log('Displaying sheet data…')
			//
			// 	displaySheetData(data)
			//
			// 	console.log('Done')
			// }

			function displaySheetData(data) {
				// `data` is an array of rows
				// each row being an array of cells.

				// Output sheet data in JSON format with syntax highlighting.
				// Doesn't work for large spreadsheets because it hangs the browser,
				// so `data` has to be capped when it's too large.
				//
				var MAX_ROWS_IN_CAPPED_DATA = 50
				var MAX_CELLS_IN_CAPPED_DATA = MAX_ROWS_IN_CAPPED_DATA * 100
				var dataCappedRowCounter = 0
				var dataCappedCellCounter = 0
				var dataWasCappedForJsonOutput = false
				var dataWasCappedForJsonOutputSomewhereInFirstRow = false
				var dataCapped = []
				for (var row of data) {
					if (dataCappedRowCounter + 1 > MAX_ROWS_IN_CAPPED_DATA) {
						dataWasCappedForJsonOutput = true
						break
					}
					if (dataCappedCellCounter + row.length > MAX_CELLS_IN_CAPPED_DATA) {
						if (dataCapped.length === 0) {
							dataCapped.push(row.slice(0, MAX_CELLS_IN_CAPPED_DATA - dataCappedCellCounter))
						}
						dataWasCappedForJsonOutput = true
						dataWasCappedForJsonOutputSomewhereInFirstRow = true
						break
					}
					dataCapped.push(row)
					dataCappedRowCounter++
					dataCappedCellCounter += row.length
				}

				// Display the capped data warning, if required.
				document.getElementById('selected-sheet-data-capped-warning').display =
					dataWasCappedForJsonOutput ? 'block' : 'none'
				document.getElementById('selected-sheet-data-capped-warning').innerText =
					dataWasCappedForJsonOutput ? `Only the first ${dataWasCappedForJsonOutputSomewhereInFirstRow ? dataCapped[0].length + ' column' + (dataCapped[0].length === 1 ? '' : 's') + ' of the first row' + (dataCapped[0].length === 1 ? ' is' : ' are'): dataCapped.length + ' row' + (dataCapped.length === 1 ? '' : 's') + ' of the total ' + data.length + ' row' + (data.length === 1 ? '' : 's') +  (dataCapped.length === 1 ? ' is' : ' are')} being shown.` : ''
				// Display the capped data (as JSON).
				document.getElementById('selected-sheet-data').innerHTML = Prism.highlight(
					JSON.stringify(dataCapped, null, 2),
					Prism.languages.javascript,
					'javascript'
				)

				// Output sheet data in a form of an HTML `<table/>`.
				// Doesn't work for large spreadsheets because it hangs the browser.
				//
				// document.getElementById('selected-sheet-data-visual').innerHTML =
				// 	'<table>' +
				// 	'<tbody>' +
				// 	data.map(function (row) {
				// 		return '<tr>' +
				// 			row.map(function (cell) {
				// 				return '<td>' +
				//  				(cell === null ? '' : cell) +
				//  				'</td>'
				// 			}).join('') +
				// 			'</tr>'
				// 	}).join('') +
				// 	'</tbody>' +
				// 	'</table>'

				// Output sheet data in a form of an HTML `<table/>` through `virtual-scroller`.
				// Doesn't hang the browser in case of large spreadsheets.

				function renderRow(row) {
					var tr = document.createElement('tr')

					for (var cell of row) {
						var td = document.createElement('td')

						// When using a <table/> as an items container, all column widths
						// must be strictly defined. Otherwise, the <table/> will automatically
						// adjust column widths based on the content. This "intelligent" approach
						// would've worked in classic HTML when all data is output at once,
						// but it won't work with virtual-scroller when only a small subset of data
						// is output at a given moment, and that subset constantly changes, resulting in
						// column widths constantly changing, which not only looks weird but it also makes
						// all row heights contantly change, causing a warning:
						// "Item index N height changed unexpectedly".
						td.style.width = (100 / row.length) + '%'
						td.style.overflow = 'hidden'
						td.style.textOverflow = 'ellipsis'

						td.innerText = cell
						tr.appendChild(td)
					}

					return tr
				}

				function getScrollableContainer() {
					return document.getElementById('table-container')
				}

				virtualScroller = new VirtualScroller(
					document.getElementById('table-rows-container'),
					data,
					renderRow,
					{ getScrollableContainer }
				)
			}

			// function onStartLoadingSheetData() {
			// 	// Stop the virtual scroller.
			// 	if (virtualScroller) {
			// 		virtualScroller.stop()
			// 		virtualScroller = undefined
			// 	}
			//
			// 	var tabs = document.querySelectorAll('#sheet-tabs .sheet-tab')
			// 	var i = 0
			// 	while (i < tabs.length) {
			// 		tabs[i].classList.add('sheet-tab--loading')
			// 		i++
			// 	}
			//
			// 	document.querySelector('#selected-sheet-tab-content').classList.add('.selected-sheet-tab-content--loading')
			// }

			// function onEndLoadingSheetData() {
			// 	var tabs = document.querySelectorAll('#sheet-tabs .sheet-tab')
			// 	var i = 0
			// 	while (i < tabs.length) {
			// 		tabs[i].classList.remove('sheet-tab--loading')
			// 		i++
			// 	}
			//
			// 	document.querySelector('#selected-sheet-tab-content').classList.remove('.selected-sheet-tab-content--loading')
			// }

			function onFileSelected(file) {
				console.log('Reading .xlsx file…')
				readXlsxFileStartedAt = Date.now()
				return readXlsxFile(file).then(
					onFileData,
					onError
				)
			}

			// function readSheet(sheetName) {
			// 	console.log(`Reading sheet "${sheetName}" data…`)
			// 	readSheetDataStartedAt = Date.now()
			// 	return readXlsxFile(input.files[0], { sheet: sheetName }).then(
			// 		onSheetData,
			// 		onError
			// 	)
			// }

			input.addEventListener('change', function() {
				onLoading()

				if (!input.files[0]) {
					onCancelLoading()
					return
				}

				onFileSelected(input.files[0])
			})

			function selectSheetTab(sheetIndex) {
				// Select the sheet's tab.
				var tabs = document.querySelectorAll('#sheet-tabs .sheet-tab')

				var i = 0
				while (i < tabs.length) {
					if (i === sheetIndex) {
						tabs[i].classList.add('sheet-tab--selected')
					} else {
						tabs[i].classList.remove('sheet-tab--selected')
					}
					i++
				}

				// // Load sheet data.
				// onStartLoadingSheetData()
				// readSheet(sheetName).finally(onEndLoadingSheetData)

				displaySheetData(excelFileData[sheetIndex].data)
			}
		</script>
	</body>
</html>
